name: Squad Preview Validation
# go project — configure build, test, and validation commands below

on:
  push:
    branches: [preview]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          lfs: true

      - name: Setup Go Environment
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: go.sum

      - name: Verify Module Dependencies
        run: go mod verify

      - name: Download Dependencies
        run: go mod download

      - name: Setup Node.js (for web UI build)
        if: hashFiles('web/package.json') != ''
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build Web UI
        if: hashFiles('web/package.json') != ''
        working-directory: web
        run: npm ci && npm run build

      - name: Ensure web/dist exists
        run: |
          if [ ! -f web/dist/index.html ]; then
            mkdir -p web/dist
            echo '<!doctype html><html><head><title>waza</title></head><body>placeholder</body></html>' > web/dist/index.html
            echo '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y="80" font-size="80">w</text></svg>' > web/dist/favicon.svg
          fi

      - name: Run Go Vet
        run: go vet ./...

      - name: Execute Tests
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Build Binary
        run: go build -v -o waza ./cmd/waza

      - name: Verify Binary
        run: ./waza --version

      - name: Integration Test
        run: |
          set +e
          ./waza run ./examples/code-explainer/eval.yaml --verbose
          EXIT_CODE=$?
          if [ $EXIT_CODE -gt 1 ]; then
            echo "::error::waza crashed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi
          echo "Preview integration test completed (exit code: $EXIT_CODE)"
