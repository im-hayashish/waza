name: Squad Release
# go project — configure build, test, and release commands below

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: go.sum

      - name: Verify Module Dependencies
        run: go mod verify

      - name: Download Dependencies
        run: go mod download

      - name: Setup Node.js (for web UI build)
        if: hashFiles('web/package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build Web UI
        if: hashFiles('web/package.json') != ''
        working-directory: web
        run: npm ci && npm run build

      - name: Ensure web/dist exists
        run: |
          if [ ! -f web/dist/index.html ]; then
            mkdir -p web/dist
            echo '<!doctype html><html><head><title>waza</title></head><body>placeholder</body></html>' > web/dist/index.html
            echo '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y="80" font-size="80">w</text></svg>' > web/dist/favicon.svg
          fi

      - name: Run Go Vet
        run: go vet ./...

      - name: Execute Tests
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Build Release Binary
        run: |
          go build -v -o waza ./cmd/waza
          ./waza --version

      - name: Integration Test
        run: |
          set +e
          ./waza run ./examples/code-explainer/eval.yaml --verbose
          EXIT_CODE=$?
          if [ $EXIT_CODE -gt 1 ]; then
            echo "::error::waza crashed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi
          echo "Release integration test completed (exit code: $EXIT_CODE)"

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! VERSION=$(git describe --tags --exact-match 2>/dev/null); then
            echo "Current commit is not tagged, skipping release creation"
            exit 0
          fi

          if gh release view "$VERSION" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "Release $VERSION already exists, skipping creation"
          else
            gh release create "$VERSION" ./waza \
              --repo "${{ github.repository }}" \
              --title "Release $VERSION" \
              --notes "Go implementation of waza CLI" \
              --latest
          fi
